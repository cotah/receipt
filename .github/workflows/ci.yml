name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receipt-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: receipt-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SUPABASE_URL: "https://fake.supabase.co"
          SUPABASE_SERVICE_KEY: "fake-key-for-ci"
          SUPABASE_ANON_KEY: "fake-anon-key"
          OPENAI_API_KEY: "fake-key-for-ci"
          GOOGLE_API_KEY: "fake-key-for-ci"
        run: pytest tests/ -v --tb=short

      - name: Syntax check all Python files
        run: python -c "
          import ast, pathlib
          errors = []
          for f in pathlib.Path('app').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('SYNTAX ERRORS:')
              for e in errors: print(f'  {e}')
              exit(1)
          print(f'All Python files OK')
          "

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receipt-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: receipt-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit
